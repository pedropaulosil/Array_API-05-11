<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalArray Explorer | Lista de Países</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="planet-bg">
        <div class="stars"></div>
        <div class="glow"></div>
        <div class="earth"></div>
    </div>

    <main class="container">
        <header>
            <h1>Global<span>Array</span></h1>
            <p>Descubra países por posição. A lista contém <strong id="total-countries">...</strong> países em <strong>ordem alfabética</strong>.</p>
        </header>

        <section class="card-painel">
            <div class="search-controls">
                <label for="position-input">Insira a posição (começando em 1):</label>
                <div class="input-group">
                    <input type="number" id="position-input" min="1" placeholder="Ex: 10">
                    <button id="search-btn" class="btn-primary">Buscar País</button>
                </div>
            </div>

            <div id="result-display" class="result-display hidden">
                <div class="flag-container">
                    <img id="country-flag" src="" alt="Bandeira do País">
                </div>
                <div class="country-info">
                    <h2 id="country-name">Nome do País</h2>
                    <p id="position-label">Posição: #<span id="country-index"></span></p>
                </div>
            </div>
            
            <div id="message-display" class="message-display">
                <p>Insira uma posição acima para ver a bandeira do país correspondente na lista alfabética.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
