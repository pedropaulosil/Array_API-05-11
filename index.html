<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaísesSearch | Explorador Global</title>
    <style>
        /* Variáveis de Cores e Estilos */
        :root {
            --primary-blue: #3b82f6;
            --primary-green: #22c55e;
            --pure-white: #ffffff;
            --dark-overlay: rgba(2, 6, 23, 0.8);
            --glass-bg: rgba(15, 23, 42, 0.85);
            --text-muted: #94a3b8;
        }

        /* Configuração Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000;
            /* Foto do globo em alta qualidade ocupando 100% da tela */
            background-image: linear-gradient(var(--dark-overlay), var(--dark-overlay)), 
                              url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--pure-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            z-index: 10;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* Cabeçalho */
        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 5px;
        }

        header h1 .blue-part {
            color: var(--primary-blue);
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        header h1 .green-part {
            color: var(--primary-green);
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }

        header p {
            color: var(--pure-white);
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Painel Glassmorphism */
        .search-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-label {
            display: block;
            text-align: left;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: var(--pure-white);
            font-size: 1.1rem;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        button {
            background: var(--primary-blue);
            color: #fff;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary-green);
            transform: translateY(-2px);
        }

        /* Área de Resultados */
        .result-area {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .flag-container {
            width: 220px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid var(--pure-white);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            margin-bottom: 15px;
            animation: scaleUp 0.5s ease-out;
        }

        .flag-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .country-info h2 {
            font-size: 1.8rem;
            color: var(--pure-white);
        }

        .country-info p {
            color: var(--primary-green);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .status-msg {
            color: var(--text-muted);
            font-style: italic;
        }

        .hidden { display: none; }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Mobile */
        @media (max-width: 480px) {
            header h1 { font-size: 2.5rem; }
            .input-group { flex-direction: column; }
            button { padding: 15px; }
            .search-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><span class="blue-part">Países</span><span class="green-part">Search</span></h1>
            <p>Procure países em ordem alfabetica</p>
        </header>

        <section class="search-card">
            <label class="input-label">Temos <span id="total-count" style="color: var(--primary-blue); font-weight: bold;">...</span> países carregados. Digite uma posição:</label>
            <div class="input-group">
                <input type="number" id="country-index" placeholder="Ex: 32" min="1">
                <button id="search-btn">BUSCAR</button>
            </div>

            <div class="result-area">
                <div id="initial-msg" class="status-msg">
                    Introduza um número para descobrir um país...
                </div>

                <div id="result-content" class="hidden">
                    <div class="flag-container">
                        <img id="flag-img" src="" alt="Bandeira">
                    </div>
                    <div class="country-info">
                        <h2 id="country-name">Nome do País</h2>
                        <p>Posição Alfabética #<span id="pos-number">0</span></p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Lógica da Aplicação
        const API_URL = 'https://restcountries.com/v3.1/all?fields=name,flags';
        let countriesList = [];

        // Elementos DOM
        const input = document.getElementById('country-index');
        const btn = document.getElementById('search-btn');
        const totalSpan = document.getElementById('total-count');
        const initialMsg = document.getElementById('initial-msg');
        const resultContent = document.getElementById('result-content');
        const flagImg = document.getElementById('flag-img');
        const nameText = document.getElementById('country-name');
        const posText = document.getElementById('pos-number');

        // Função para carregar dados reais
        async function fetchCountries() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Ordenação Alfabética Inteligente
                countriesList = data.map(c => ({
                    name: c.name.common,
                    flag: c.flags.svg
                })).sort((a, b) => a.name.localeCompare(b.name));

                totalSpan.textContent = countriesList.length;
                input.max = countriesList.length;
            } catch (error) {
                totalSpan.textContent = "Erro";
                initialMsg.textContent = "Falha ao carregar lista de países.";
                initialMsg.style.color = "#f43f5e";
            }
        }

        // Função para mostrar o país selecionado
        function searchCountry() {
            const index = parseInt(input.value);

            if (!index || index < 1 || index > countriesList.length) {
                initialMsg.classList.remove('hidden');
                resultContent.classList.add('hidden');
                initialMsg.textContent = `Por favor, indique um número entre 1 e ${countriesList.length}.`;
                initialMsg.style.color = "#f43f5e";
                return;
            }

            const country = countriesList[index - 1];

            // Atualiza Interface
            flagImg.src = country.flag;
            nameText.textContent = country.name;
            posText.textContent = index;

            initialMsg.classList.add('hidden');
            resultContent.classList.remove('hidden');

            // Reinicia animação para efeito visual
            resultContent.style.animation = 'none';
            resultContent.offsetHeight; 
            resultContent.style.animation = null;
        }

        // Eventos
        btn.addEventListener('click', searchCountry);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchCountry();
        });

        // Início
        fetchCountries();
    </script>
</body>
</html>
