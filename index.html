    .panel-val { font-size:0.82rem; font-weight:700; color:var(--text); text-align:right; }

let filtered=[...countries];
const grid=document.getElementById('grid');
const emptyEl=document.getElementById('empty');
const countEl=document.getElementById('count');
const tenthEl=document.getElementById('tenth');
const foundEl=document.getElementById('found');
const panel=document.getElementById('panel');
const overlay=document.getElementById('overlay');
document.getElementById('yr').textContent=new Date().getFullYear();

function fmt(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n.toLocaleString('pt-BR');}
function fmtArea(n){return n<1?'<1 km²':n.toLocaleString('pt-BR')+' km²';}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const cont=document.getElementById('continent-filter').value;
  const sort=document.getElementById('sort-filter').value;
  filtered=countries.filter(c=>{
    const mq=!q||c.name.toLowerCase().includes(q)||c.capital.toLowerCase().includes(q)||c.native.toLowerCase().includes(q);
    const mc=!cont||c.continent===cont;
    return mq&&mc;
  });
  if(sort==='pop') filtered.sort((a,b)=>b.pop-a.pop);
  else if(sort==='area') filtered.sort((a,b)=>b.area-a.area);
  else filtered.sort((a,b)=>a.name.localeCompare(b.name,'pt'));
  countEl.textContent=filtered.length;
  tenthEl.textContent=filtered[9]?filtered[9].name:'—';
  foundEl.textContent=filtered.length===1?filtered[0].name:(filtered.length===0?'Nenhum':'—');
  grid.innerHTML='';
  if(!filtered.length){emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  filtered.forEach((c,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<span class="card-index">[${String(i).padStart(3,'0')}]</span><span class="card-flag">${c.flag}</span><div class="card-name">${c.name}</div><div class="card-capital">${c.capital}</div><div class="card-tags"><span class="tag continent">${c.continent}</span><span class="tag pop">${fmt(c.pop)} hab.</span></div>`;
    card.addEventListener('click',()=>openPanel(c,i));
    grid.appendChild(card);
  });
}

function openPanel(c,i){
  document.getElementById('d-flag').textContent=c.flag;
  document.getElementById('d-name').textContent=c.name;
  document.getElementById('d-native').textContent=c.native!==c.name?`"${c.native}"`:' ';
  document.getElementById('d-capital').textContent=c.capital;
  document.getElementById('d-continent').textContent=c.continent;
  document.getElementById('d-pop').textContent=c.pop.toLocaleString('pt-BR')+' hab.';
  document.getElementById('d-area').textContent=fmtArea(c.area);
  document.getElementById('d-lang').textContent=c.lang;
  document.getElementById('d-currency').textContent=c.currency;
  document.getElementById('d-index').textContent=`[${i}]`;
  panel.classList.add('open');
  overlay.classList.add('open');
}

function closePanel(){panel.classList.remove('open');overlay.classList.remove('open');}

document.getElementById('close-btn').addEventListener('click',closePanel);
overlay.addEventListener('click',closePanel);
document.getElementById('search').addEventListener('input',applyFilters);
document.getElementById('continent-filter').addEventListener('change',applyFilters);
document.getElementById('sort-filter').addEventListener('change',applyFilters);
document.getElementById('clear-btn').addEventListener('click',()=>{
  document.getElementById('search').value='';
  document.getElementById('continent-filter').value='';
  document.getElementById('sort-filter').value='name';
  applyFilters();
});
applyFilters();
</script>
</body>
</html>
